# 安全配置文件
# 优先级：此文件 > backend/config/config.py > 环境变量

security:
  # JWT配置
  jwt:
    secret_key: "your-super-secret-jwt-key-change-in-production"
    algorithm: "HS256"
    access_token_expire_minutes: 30
    refresh_token_expire_days: 7
    issuer: "vectorsphere"
    audience: "vectorsphere-users"
    
  # 密码策略
  password:
    min_length: 8
    require_uppercase: true
    require_lowercase: true
    require_numbers: true
    require_special_chars: true
    max_attempts: 5
    lockout_duration_minutes: 15
    
  # 会话管理
  session:
    timeout_minutes: 60
    max_concurrent_sessions: 3
    secure_cookies: true
    httponly_cookies: true
    samesite: "Strict"
    
  # API安全
  api:
    # 速率限制
    rate_limiting:
      enabled: true
      default_limit: "100/hour"
      
      # 不同端点的限制
      endpoints:
        "/api/auth/login": "10/minute"
        "/api/training/create": "5/minute"
        "/api/models/upload": "3/hour"
        "/api/data/upload": "10/hour"
    
    # CORS配置
    cors:
      enabled: true
      origins:
        - "http://localhost:3000"
        - "https://yourdomain.com"
      methods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
      headers:
        - "Content-Type"
        - "Authorization"
        - "X-Requested-With"
    
    # API密钥管理
    api_keys:
      enabled: true
      key_length: 32
      expire_days: 365
      max_keys_per_user: 5
      
  # 文件上传安全
  file_upload:
    max_file_size_mb: 100
    allowed_extensions:
      - ".txt"
      - ".csv"
      - ".json"
      - ".yaml"
      - ".yml"
      - ".py"
      - ".ipynb"
    
    # 病毒扫描
    virus_scan:
      enabled: false
      scanner: "clamav"
      
    # 文件类型验证
    mime_type_validation: true
    
  # 数据加密
  encryption:
    # 静态数据加密
    at_rest:
      enabled: true
      algorithm: "AES-256-GCM"
      key_rotation_days: 90
      
    # 传输加密
    in_transit:
      force_https: true
      tls_version: "1.2"
      cipher_suites:
        - "ECDHE-RSA-AES256-GCM-SHA384"
        - "ECDHE-RSA-AES128-GCM-SHA256"
        
  # 审计日志
  audit:
    enabled: true
    log_level: "INFO"
    
    # 记录的事件类型
    events:
      authentication: true
      authorization: true
      data_access: true
      configuration_changes: true
      training_operations: true
      model_operations: true
      
    # 日志存储
    storage:
      type: "file"  # file, database, elasticsearch
      path: "/var/log/vectorsphere/audit.log"
      rotation_size_mb: 100
      retention_days: 365
      
  # 漏洞扫描
  vulnerability_scan:
    enabled: false
    schedule: "0 2 * * 0"  # 每周日凌晨2点
    tools:
      - "bandit"  # Python安全扫描
      - "safety"  # 依赖漏洞扫描
      
  # 入侵检测
  intrusion_detection:
    enabled: false
    
    # 异常行为检测
    anomaly_detection:
      failed_login_threshold: 10
      unusual_access_pattern: true
      suspicious_file_access: true
      
    # 响应措施
    response:
      auto_block_ip: true
      block_duration_minutes: 60
      notify_admin: true