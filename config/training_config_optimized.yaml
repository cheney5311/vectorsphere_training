# 优化的训练配置示例
# 支持动态更新和热重载

# 基础配置
model_name: "gpt2-large"
output_dir: "./outputs"
experiment_name: "gpt2_finetuning_experiment"

# 训练参数
batch_size: 16
learning_rate: 0.00005
num_epochs: 5
warmup_steps: 1000
gradient_accumulation_steps: 2

# 优化器配置
optimizer: "adamw"
weight_decay: 0.01
max_grad_norm: 1.0

# 调度器配置
scheduler: "cosine"
scheduler_params:
  min_lr: 1e-6
  decay_rate: 0.95

# 检查点配置
save_steps: 1000
save_total_limit: 3
checkpoint_dir: "./checkpoints"

# 早停配置
early_stopping: true
early_stopping_patience: 3
early_stopping_threshold: 0.001

# 混合精度
use_fp16: true
fp16_opt_level: "O2"

# 分布式训练
use_distributed: false
world_size: 1
master_port: "12355"

# 设备配置
device: "auto"

# 数据配置
max_seq_length: 1024
train_data_path: "./data/train.jsonl"
val_data_path: "./data/val.jsonl"
test_data_path: "./data/test.jsonl"

# 监控配置
logging_steps: 50
eval_steps: 500
log_level: "INFO"

# 高级配置
seed: 42
resume_from_checkpoint: null
enable_wandb: true
wandb_project: "vectorsphere-optimized-training"

# 三阶段训练配置
three_stage_training:
  enabled: true
  stages:
    pretrain:
      enabled: false
    finetune:
      enabled: true
      num_epochs: 3
      learning_rate: 0.00002
    preference:
      enabled: true
      num_epochs: 2
      learning_rate: 0.000005

# 资源限制
resource_limits:
  max_concurrent_jobs: 2
  max_gpu_per_job: 2
  max_cpu_per_job: 8
  max_memory_per_job: 16  # GB

# 调试配置
debug:
  enable_profiling: false
  profile_steps: 100
  debug_mode: false