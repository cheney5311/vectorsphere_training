apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkpoint-uploader
  labels:
    app: checkpoint-uploader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkpoint-uploader
  template:
    metadata:
      labels:
        app: checkpoint-uploader
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      containers:
        - name: checkpoint-uploader
          image: your-registry/vectorsphere/uploader:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CHECKPOINT_QUEUE_DIR
              value: "/data/checkpoint_queue"
            - name: CHECKPOINT_UPLOADER_POLL_INTERVAL
              value: "5"
            - name: CHECKPOINT_UPLOADER_METRICS_PORT
              value: "8001"
          ports:
            - containerPort: 8001
              name: metrics
          volumeMounts:
            - name: queue-volume
              mountPath: /data/checkpoint_queue
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: queue-volume
          persistentVolumeClaim:
            claimName: checkpoint-uploader-queue-pvc
